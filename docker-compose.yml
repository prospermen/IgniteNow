services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/logs:/app/backend/logs
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
  redis:
    image: redis:7-alpine
    container_name: ignitenow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  worker:
    build: .
    container_name: ignitenow-worker
    command: python -m backend.app.worker
    env_file:
      - .env
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/logs:/app/backend/logs
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    container_name: ignitenow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ignitenow
    ports:
      - "5432:5432"
    volumes:
      - ignitenow_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  ignitenow_postgres:
