services:
  app:
    build: .
    ports:
      - "8010:8010"
    env_file:
      - .env
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/logs:/app/backend/logs
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    container_name: ignitenow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8.4
    container_name: ignitenow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ignitenow
    ports:
      - "3306:3306"
    volumes:
      - ignitenow_mysql:/var/lib/mysql

volumes:
  ignitenow_mysql:
